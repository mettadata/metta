name: trivial
description: Trivial workflow for single-file fixes scored with file_count <= 1
version: 1

artifacts:
  - id: intent
    type: intent
    template: intent.md
    generates: intent.md
    requires: []
    agents: [proposer]
    gates: []

  - id: implementation
    type: execution
    template: execute.md
    generates: "**/*"
    requires: [intent]
    agents: [executor]
    gates: [tests, lint, typecheck, build]

  - id: verification
    type: verification
    template: verify.md
    generates: summary.md
    requires: [implementation]
    agents: [verifier]
    gates: []
